<body>
    <!--  Main Wrap  -->
    <div id="main-wrap">
        <!--  Header & Menu  -->
        <div id="header-placeholder" data-header-class="transparent--fixed"></div>
        <!--  END Header & Menu  -->

        <!--  Page Header  -->
        <div class="page-header--image" data-overlay>
            <picture class="imagebg">
                <img src="/assets/img/banner/contact.png" alt="" width="1600" height="900" fetchpriority="high" loading="eager">
            </picture>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 d-none">
                        <div class="sectiontitle-element--light--center">
                            <h1>Let's Connect</h1>
                            <p>Ready to bring Innovation to your business? We'd love to hear from you.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!--  END Page Header  -->

        <!--  Page Content  -->
        <div class="page-content">
            <section data-padding="sm">
                <div class="container">
                    <div data-aos="fade-up" class="row" data-padding="xstop">
                        <div class="col-12">
                            <div class="sectiontitle-element--center">
                                <h2>Get in touch</h2>
                                <p>Our team is here to help. Fill out the form below and we'll get back to you shortly.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section data-padding="bottom">
                <div class="container">
                    <div data-aos="fade-up" class="row align-items-lg-center">
                        <div class="col-12 col-lg-8 offset-lg-2">
                            <!--  Form  -->
                            <form id="contact-form">
                                <div class="basic-form--border--round--row">
                                    <div class="field col-lg-6">
                                        <label for="name">Your Name <sup>*</sup></label>
                                        <input id="name" name="name" type="text" class="form-field">
                                    </div>
                                    <div class="field col-lg-6">
                                        <label for="mail">Email Address <sup>*</sup></label>
                                        <input id="mail" name="mail" type="email" placeholder="Email" class="form-field" data-error="false">
                                    </div>
                                    <div class="field col-lg-6">
                                        <label for="jobtitle">Job Title</label>
                                        <input id="jobtitle" name="jobtitle" type="text" class="form-field">
                                    </div>
                                    <div class="field col-lg-6">
                                        <label for="company">Company / Business Name</label>
                                        <input id="company" name="company" type="text" class="form-field">
                                    </div>
                                    <div class="field col-lg-6">
                                        <label for="phone">Phone Number</label>
                                        <input id="phone" name="phone" type="tel" class="form-field">
                                    </div>
                                    <div class="field col-lg-6">
                                        <label for="country">Country</label>
                                        <input id="country" name="country" type="text" class="form-field" placeholder="Auto-filled from phone code">
                                    </div>
                                    <div class="field col-12">
                                        <label for="message">Message <sup>*</sup></label>
                                        <textarea id="message" name="message" class="form-field"></textarea>
                                    </div>
                                    <div class="alert-wrap col-12" data-active="false">
                                        <p>For the error message see contact.php file</p>
                                    </div>
                                    <div class="field col-12 text-center">
                                        <input id="submit" type="submit" class="btn--big--round" value="Send Message">
                                    </div>
                                </div>
                            </form>
                            <!--  END Form  -->
                        </div>
                    </div>
                </div>
            </section>

            
        </div>
        <!--  END Page Content  -->

        <!--  Footer  -->
        <div id="footer-placeholder"></div>
        <!--  END Footer  -->
    </div>

    <script defer src="assets/js/jquery.min.js"></script>

    <script defer src="assets/js/carousel.js"></script>
    <script defer src="assets/js/includes.js"></script>
    <script defer src="assets/js/menu.js"></script>
    <script defer src="assets/js/elements.js"></script>
    <script defer src="assets/js/masonry.js"></script>
    <!-- intl-tel-input v23 -->
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23/build/js/intlTelInput.min.js"></script>
    <script>
        (function () {
            var phoneInput = document.getElementById('phone');
            if (!phoneInput) return;

            window.iti = intlTelInput(phoneInput, {
                initialCountry: 'qa',
                separateDialCode: true,
                preferredCountries: ['ae', 'sa', 'qa', 'kw', 'bh', 'om', 'gb', 'us'],
                utilsScript: 'https://cdn.jsdelivr.net/npm/intl-tel-input@23/build/js/utils.js'
            });

            phoneInput.addEventListener('countrychange', function () {
                var data = window.iti.getSelectedCountryData();
                var countryField = document.getElementById('country');
                if (countryField && data && data.name) {
                    countryField.value = data.name;
                }
            });

            // Pre-fill Country field on page load with the initial country (UAE)
            phoneInput.dispatchEvent(new Event('countrychange'));
        })();
    </script>
    <script defer src="assets/js/form.js"></script>
    <!--  END Scripts  -->
